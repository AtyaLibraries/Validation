name: CodeQL

on:
  push:
    branches: [development, master]
  pull_request:
    branches: [development, master]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    uses: AtyaLibraries/github-workflows/.github/workflows/codeql-csharp.yml@v1
    with:
      solution: ./Validation.sln
