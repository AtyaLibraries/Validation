version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    target-branch: development
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dotnet-analyzers:
        patterns:
          - "Microsoft.CodeAnalysis.*"
          - "StyleCop.*"
          - "*.Analyzers.*"
      test-stack:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
          - "FluentAssertions"
          - "NSubstitute*"
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    target-branch: development
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(actions)"
      include: scope
