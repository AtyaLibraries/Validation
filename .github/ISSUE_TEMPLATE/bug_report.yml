name: Bug report
description: Something in Validation is broken.
labels: [bug, triage]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Steps or code snippet that reproduces the issue.
      render: csharp
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "1.2.3"
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: .NET runtime
      placeholder: "net10.0"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
